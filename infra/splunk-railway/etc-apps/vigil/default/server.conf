[general]
# Railway's private network (*.railway.internal) is IPv6-only, so splunkd must
# listen on IPv6 for the ingestor to reach the management REST API (8089).
listenOnIPv6 = yes
# Allow authenticated REST logins from off-box (the ingestor), not just localhost.
allowRemoteLogin = always

[diskUsage]
# Splunk defaults to requiring 5 GB free before it will index or run searches.
# On a modest Railway volume that blocks everything — lower it for this
# low-volume demo. (Data is small; the generator feeds a trickle.)
minFreeSpace = 800

