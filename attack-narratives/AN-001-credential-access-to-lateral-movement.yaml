# VIGIL Attack Narrative Definition
# Defines expected attacker progression, detection chain,
# and auto-response triggers for a known attack pattern.

narrative_id: AN-001
name: Credential Access → Lateral Movement
description: >
  Classic credential theft and lateral movement chain.
  Attacker targets LSASS to steal credentials, then uses those
  credentials to move laterally across the environment.

version: 1.0.0
status: active

phases:
  - phase: credential-access
    detections:
      - detection_id: D1-LSASS-MEMORY-ACCESS
        status: Observed
        confidence_contribution: 0.25
      - detection_id: D2-LSASS-DUMP-CREATION
        status: Confirmed
        confidence_contribution: 0.50
      - detection_id: D3-CREDENTIAL-REUSE-ANOMALY
        status: Observed
        confidence_contribution: 0.20
    escalation_threshold: 0.65
    auto_escalate: true

  - phase: lateral-movement
    detections:
      - detection_id: D4-LATERAL-MOVEMENT-COMPROMISED-CREDS
        status: Observed
        confidence_contribution: 0.40
    escalation_threshold: 0.70
    auto_escalate: true

progression_rules:
  - from: credential-access
    to: lateral-movement
    trigger_detection: D4-LATERAL-MOVEMENT-COMPROMISED-CREDS
    require_prior_phase_confidence: 0.50

response_playbooks:
  credential_access_confirmed:
    trigger: "phase=credential-access AND status=Confirmed AND confidence>=0.65"
    immediate:
      - action: isolate_host
        target: affected_host
        automated: false
      - action: kill_process
        target: dump_process
        automated: false
      - action: capture_forensic_snapshot
        target: affected_host
        automated: false
    follow_up:
      - action: reset_credentials
        target: affected_user
      - action: search_for_dump_files
        target: affected_host

  lateral_movement_observed:
    trigger: "phase=lateral-movement AND status=Observed"
    immediate:
      - action: isolate_host
        target: source_host
        automated: false
      - action: isolate_host
        target: destination_host
        automated: false
      - action: reset_credentials
        target: compromised_user
        automated: false
    follow_up:
      - action: block_protocol
        target: smb_lateral
        protocol: SMB
      - action: review_auth_logs
        target: destination_host
