detection_id: D3-CREDENTIAL-REUSE-ANOMALY
name: Credential Usage Anomaly - Potential Reuse
description: >
  Detects authentication patterns consistent with credential reuse following
  a credential access event. Increases confidence on an existing
  credential-access AttackState rather than creating a new one.

version: 1.0.0
status: production

att&ck:
  tactic: credential-access
  tactic_id: TA0006
  technique: Valid Accounts
  technique_id: T1078
  sub_technique: Domain Accounts
  sub_technique_id: T1078.002

required_telemetry:
  - source: windows_security
    event_id: 4624
    description: Successful logon
  - source: windows_security
    event_id: 4625
    description: Failed logon

state_impact:
  transitions_to: credential-access
  status: Observed
  confidence_contribution: 0.20
  note: >
    Increases confidence on existing credential-access state.
    Combined with D1/D2, pushes toward Confirmed.
  entities_extracted:
    - type: user
      field: TargetUserName
    - type: host
      field: WorkstationName

logic:
  abstraction: >
    User authenticating to multiple hosts in a short window, or authenticating
    from a source that does not match their normal baseline. Requires
    correlation window of 10 minutes.

  splunk_spl: |
    index=wineventlog EventCode=4624 LogonType=3
    | stats count as auth_count, dc(ComputerName) as unique_hosts, values(ComputerName) as hosts
      by TargetUserName, _time span=10m
    | where auth_count >= 3 AND unique_hosts >= 2
    | eval detection_id="D3-CREDENTIAL-REUSE-ANOMALY"
    | table _time, TargetUserName, auth_count, unique_hosts, hosts

  sentinel_kql: |
    SecurityEvent
    | where EventID == 4624 and LogonType == 3
    | summarize auth_count = count(), unique_hosts = dcount(Computer), hosts = make_set(Computer)
      by TargetUserName, bin(TimeGenerated, 10m)
    | where auth_count >= 3 and unique_hosts >= 2
    | extend detection_id = "D3-CREDENTIAL-REUSE-ANOMALY"

  elastic_eql: |
    sequence by user.name with maxspan=10m
    [authentication where event.outcome == "success" and network.type == "ipv4"] with runs=3

severity: medium
false_positive_risk: high
notes: >
  High false positive rate standalone. Primarily valuable as a confidence
  amplifier on an existing credential-access AttackState. Threshold tuning
  required per environment — service accounts and IT admins will trigger this.
