version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: vigil
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigil"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  elasticsearch:
    image: elasticsearch:8.14.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

  temporal:
    image: temporalio/auto-setup:1.24.2
    depends_on:
      - postgres
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=vigil
      - POSTGRES_PWD=changeme
      - POSTGRES_SEEDS=postgres

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./services/api/.env.example
    environment:
      - DATABASE_URL=postgresql://vigil:changeme@postgres:5432/vigil
    ports:
      - "8000:8000"

  signal-translation:
    build:
      context: .
      dockerfile: ./services/signal-translation/Dockerfile
    env_file:
      - ./services/signal-translation/.env.example
    ports:
      - "8004:8004"
    volumes:
      - ./detections:/app/detections

  ai-engine:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile
    depends_on:
      - kafka
      - redis
    env_file:
      - ./services/ai-engine/.env.example
    environment:
      - REDIS_URL=redis://redis:6379/1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ATTACK_STATE_ENGINE_URL=http://attack-state-engine:8002
    ports:
      - "8006:8006"

  detection-engine:
    build:
      context: ./services/detection-engine
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./services/detection-engine/.env.example
    environment:
      - DATABASE_URL=postgresql://vigil:changeme@postgres:5432/vigil
      - SIGNAL_TRANSLATION_URL=http://signal-translation:8004
    ports:
      - "8005:8005"
    volumes:
      - ./detections:/app/detections

  playbook-engine:
    build:
      context: ./services/playbook-engine
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      temporal:
        condition: service_started
    env_file:
      - ./services/playbook-engine/.env.example
    environment:
      - DATABASE_URL=postgresql://vigil:changeme@postgres:5432/vigil
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TEMPORAL_HOST=temporal:7233
      - ATTACK_STATE_ENGINE_URL=http://attack-state-engine:8002
    ports:
      - "8007:8007"
    volumes:
      - ./attack-narratives:/app/attack-narratives

  analyst-portal:
    build:
      context: ./services/analyst-portal
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - ./services/analyst-portal/.env.example
    environment:
      - DATABASE_URL=postgresql://vigil:changeme@postgres:5432/vigil
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ATTACK_STATE_ENGINE_URL=http://attack-state-engine:8002
    ports:
      - "8008:8008"

volumes:
  postgres_data:
  redis_data:
  elastic_data:
