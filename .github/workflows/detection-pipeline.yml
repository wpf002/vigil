name: Detection Pipeline

on:
  pull_request:
    paths:
      - 'detections/yaml/**'
      - 'attack-narratives/**'
  push:
    branches: [main]
    paths:
      - 'detections/yaml/**'
      - 'attack-narratives/**'

jobs:
  validate-and-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r services/signal-translation/requirements.txt

      - name: Validate YAML schema
        run: python services/signal-translation/cli.py validate

      - name: Compile detections (SPL + KQL + EQL)
        run: python services/signal-translation/cli.py compile

      - name: ATT&CK coverage report
        run: python services/signal-translation/cli.py coverage

      - name: Verify compiler is idempotent
        run: |
          python services/signal-translation/cli.py compile
          if [ -n "$(git status --porcelain detections/compiled)" ]; then
            echo "Compiler output changed on second run — not idempotent."
            git --no-pager diff detections/compiled
            exit 1
          fi

  deploy:
    needs: validate-and-compile
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Deploy to Splunk
        env:
          SPLUNK_HOST: ${{ secrets.SPLUNK_HOST }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
        run: |
          python scripts/deploy_detections.py \
            --backend splunk \
            --rules-dir detections/compiled/splunk/ \
            --splunk-host $SPLUNK_HOST \
            --splunk-token $SPLUNK_TOKEN

      - name: Update coverage report
        run: python scripts/mitre_coverage.py detections/yaml/ --output docs/coverage-report.md
